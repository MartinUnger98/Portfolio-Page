<section id="atf" class="position-relative d-flex justify-content-center align-items-center">
    <div class="d-flex justify-content-center align-items-start mb-atf">
        <div class="rotate">
            <span [@slideInFromBottom] translate>I am</span>
        </div>
        <div class="d-flex flex-column align-items-center">
            <span class="name" [@slideInFromTop]>Martin Unger</span>
            <span class="job" [@fadeInTitle]>FRONTEND DEVELOPER</span>
            <button class="talk-btn">
                <a href="#contact"><span translate>Let's talk!</span></a>            
            </button>
        </div>
        <img class="blue_neon position-absolute" src="assets/neon_img/blue_atf.svg" alt="">
        <img class="green_neon position-absolute" src="assets/neon_img/green_atf.svg" alt="">
    </div>
    <div class="social-media d-flex align-items-center">
        <div class="line"></div>
        <a *ngFor="let img of socialMedia" href="{{ img.link }}" target="_blank" rel="noopener noreferrer">
            <img  src="assets/icons/{{ img.img }}" class="social-media-btn" alt="">
        </a>    
    </div>    
</section>
