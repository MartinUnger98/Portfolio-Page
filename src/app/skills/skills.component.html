<section class="d-flex justify-content-center position-relative"  id="skills" >
    <div class="d-flex justify-content-between content">
        <div class="d-flex flex-column align-items-center">
            <div class="image-grid" [@fadeInFromBottom]="isVisible ? 'in' : 'void'" >
                <div *ngFor="let skill of skills" class="skill d-flex flex-column align-items-center">
                    <img src="assets/icons/{{ skill.img }}" alt="">
                    <p>{{ skill.txt }}</p>
                </div>
            </div>
            <button class="btnResponsive"><a href="#portfolio"><span translate>Intrigued?</span></a></button>
        </div>
        <div class="skills d-flex justify-content-center flex-column">
            <div class="d-flex justify-content-between align-items-center">
                <h1>Skills</h1>
                <div class="line"></div>
            </div>
            <p translate>As a software developer, I'm engaged with the circle of lifelong learning. I always keep an eye on the latest technologies. This way, I have been able to constantly expand my tech stack, which can be proved by my projects in the next section.</p>
            <button class="btn"><a href="#portfolio"><span translate>Intrigued?</span></a></button>
        </div>
        <img src="assets/neon_img/green_skills_right.svg" class="position-absolute neongreen-right" alt="">
    </div>
</section>
