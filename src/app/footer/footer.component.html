<section class="d-flex justify-content-between align-items-center">
    <div class="width d-flex flex-column align-items-center">
        <img class="logo" src="assets/icons/logo.svg" alt="">
        <a class="imprint" routerLink="/imprint">Imprint</a>        
    </div>
    <span>© Martin Unger 2023</span>
    <div class="d-flex">
        <div *ngFor="let img of socialMedia">
            <a href="{{ img.link }}" target="_blank" rel="noopener noreferrer">
                <img class="scl-media" src="assets/icons/{{ img.img }}" alt="">
            </a>        
        </div>
    </div>
    <a routerLink="/imprint" class="imprint_phone">Imprint</a>
</section>
